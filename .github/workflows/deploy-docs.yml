name: Build and deploy Writerside docs

on:
  push:
    branches: [main]
    paths:
      - 'Writerside/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs
# (we want the latest commit to publish, not stomp earlier ones mid-flight).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build with Writerside
    runs-on: ubuntu-latest
    env:
      # Build the whole language BUILD GROUP (English + zh / ja / ko) so the
      # published site carries all languages behind the header switcher. For a
      # group, INSTANCE points at the build-group name (cfg/build-groups.xml
      # <build-group name="languages">) and is-group=true is set below.
      INSTANCE: Writerside/languages
      # Pin Writerside builder version. Group builds (is-group / -g) need a
      # builder newer than 243.21565 (2024.3), which rejects `-g` with
      # "Unrecognized option: -g" - so use the current release.
      DOCKER_VERSION: '2026.06.8817'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # JetBrains hasn't published a Node 24 build yet (v4 is the latest major),
      # so this step still logs a Node 20 deprecation notice until they release one.
      - name: Build docs (language group) using Writerside Docker builder
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: ${{ env.INSTANCE }}
          is-group: 'true'
          docker-version: ${{ env.DOCKER_VERSION }}

      - name: Save build artifacts for diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: webHelp
          # A group build emits multiple files (one per instance) into artifacts/.
          path: artifacts/*
          retention-days: 7

      - name: Unzip site for GitHub Pages
        run: |
          mkdir -p site
          echo "=== artifacts/ produced by the group build ==="
          ls -la artifacts/ || true
          # A group build emits ONE combined zip: English at the root plus one
          # subfolder per build-group path (/zh, /ja, /ko), each page carrying
          # its instance's topic-file suffix (welcome-zh.html — deduplicated to
          # clean names by the next step). -o overwrites without the
          # interactive prompt that hung the first run.
          for z in artifacts/*.zip; do
            [ -e "$z" ] || continue
            echo "--- unzipping $z ---"
            # The group build zips entries with absolute paths (/index.html).
            # unzip strips them and extracts fine, but exits 1 for the
            # warnings, which `bash -e` treats as failure. Accept 1; fail on 2+.
            unzip -o -O UTF-8 -qq "$z" -d site || [ $? -eq 1 ]
          done
          # The build-group paths now carry the /azure-docs Pages prefix (see
          # cfg/build-groups.xml); if the builder mirrors that prefix into the
          # zip layout, hoist the contents so Pages doesn't serve /azure-docs/azure-docs/.
          if [ -d site/azure-docs ]; then
            echo "--- hoisting site/azure-docs/* to site root ---"
            tmp=$(mktemp -d)
            mv site/azure-docs/* "$tmp"/
            rm -rf site
            mv "$tmp" site
          fi
          echo "=== welcome pages (URL check) ==="
          ls -1 site/welcome*.html site/*/welcome*.html 2>/dev/null || true

      # The topic files are suffixed (welcome-zh.md) only because Writerside
      # requires unique topic names across all instances in the shared topics/
      # dir. With each language already namespaced by its /zh /ja /ko folder,
      # the suffix is pure redundancy in the URL — so strip it: rename the
      # pages to clean names and rewrite every reference (nav links, HelpTOC,
      # config, sitemap — and the root instances' switcher links) to match.
      - name: Clean language URLs (/zh/welcome.html instead of /zh/welcome-zh.html)
        run: |
          for l in zh ja ko; do
            [ -d "site/$l" ] || continue
            renamed=0
            while IFS= read -r -d '' f; do
              mv "$f" "${f%-$l.html}.html"
              renamed=$((renamed+1))
            done < <(find "site/$l" -type f -name "*-$l.html" -print0)
            echo "$l: renamed $renamed pages"
          done
          # Rewrite references in every text asset, site-wide (the English
          # root's language-switcher links point into zh/…-zh.html too).
          find site -type f \( -name '*.html' -o -name '*.json' -o -name '*.xml' -o -name '*.js' -o -name '*.jhm' \) -print0 \
            | xargs -0 sed -i -E 's/-(zh|ja|ko)\.html/.html/g'
          echo "=== cleaned welcome pages ==="
          ls -1 site/welcome*.html site/*/welcome*.html 2>/dev/null || true
          echo "=== any suffixed page left? (should be empty) ==="
          find site -name '*-zh.html' -o -name '*-ja.html' -o -name '*-ko.html' | head

      # Writerside's language switcher (config.json `editions`) only navigates
      # to each instance's ROOT, and it's not made of links — the header
      # renders a div.edition-switch dropdown whose options are plain
      # `ul.edition-switch__popup > li` items handled in JS (verified against
      # the deployed DOM). Since the clean-URLs step gives every language an
      # identical page set (quick-start.html ↔ zh/quick-start.html), a small
      # capture-phase click-interceptor recognises those items by their alias
      # label and forwards to the SAME page in the target language. Same-
      # language picks fall through (dropdown closes normally), and without JS
      # the switcher still works (root landing, as before). The alias→lang map
      # must match cfg/build-groups.xml.
      - name: Make the language switcher keep the current page
        run: |
          cat > site/lang-switch.js <<'EOF'
          (function () {
            var BASE = '/azure-docs';
            var ALIAS_TO_LANG = { 'English': '', '简体中文': 'zh', '日本語': 'ja', '한국어': 'ko' };
            function pageLang(pathname) {
              var m = pathname.replace(BASE, '').match(/^\/(zh|ja|ko)(\/|$)/);
              return m ? m[1] : '';
            }
            document.addEventListener('click', function (e) {
              var li = e.target && e.target.closest && e.target.closest('ul.edition-switch__popup li');
              if (!li) return;
              var alias = (li.textContent || '').trim();
              if (!(alias in ALIAS_TO_LANG)) return;              // unknown item — let the app handle it
              var targetLang = ALIAS_TO_LANG[alias];
              var currentLang = pageLang(location.pathname);
              if (targetLang === currentLang) return;             // picked the current language — just close
              var page = location.pathname.split('/').pop();
              if (!page || page === 'index.html' || !/\.html$/.test(page)) return; // nothing to map — root is fine
              e.preventDefault();
              e.stopPropagation();                                // beat the app's own root-navigation handler
              location.href = (targetLang ? BASE + '/' + targetLang : BASE) + '/' + page;
            }, true);
          })();
          EOF
          # Inject into every page of every language (absolute src works from all
          # folders). The ?v=<commit> cache-buster matters: GitHub Pages serves
          # with max-age=600, and a stale cached copy of this script is exactly
          # what shipped the root-landing behaviour to already-warm browsers.
          find site -name '*.html' -print0 \
            | xargs -0 sed -i "s|</head>|<script src=\"/azure-docs/lang-switch.js?v=${GITHUB_SHA}\" defer></script></head>|"
          echo "pages injected: $(grep -rl 'lang-switch.js' site --include='*.html' | wc -l)"

      # Writerside's header (.wh-header, a flex row) ships with just the logo
      # icon - no product name - and puts the language switcher directly after
      # it, with .wh-header__divider (flex-grow:1, an invisible 0-height
      # spacer, verified against the deployed DOM) pushing only the theme
      # toggle to the far right. Reordering the flex children moves the
      # switcher to sit next to the toggle instead, and an ::after on the logo
      # link adds the product name beside the icon. Scoped to >=1024px, the
      # breakpoint (confirmed 900px mobile / 1024px desktop) where Writerside
      # swaps to its hamburger header and drops .wh-header__switchers from the
      # DOM entirely - below that there's no theme toggle to sit next to, and
      # no room for the extra text.
      - name: "Header: product name next to the logo, language switcher next to the theme toggle"
        run: |
          cat > site/header-custom.css <<'EOF'
          @media (min-width: 1024px) {
            .wh-header__link {
              display: flex;
              align-items: center;
              gap: 8px;
              text-decoration: none;
            }
            .wh-header__link::after {
              content: "Azure DevOps Pull Requests";
              color: #fff;
              font-size: 17px;
              font-weight: 600;
              white-space: nowrap;
            }
            [data-test="header-edition"] { order: 2; }
            .wh-header__divider { order: 1; }
            .wh-header__switchers { order: 3; }
          }
          EOF
          find site -name '*.html' -print0 \
            | xargs -0 sed -i "s|</head>|<link rel=\"stylesheet\" href=\"/azure-docs/header-custom.css?v=${GITHUB_SHA}\"></head>|"
          echo "pages injected: $(grep -rl 'header-custom.css' site --include='*.html' | wc -l)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  # Advisory: surface broken links and structural issues, but don't block
  # deploys on them. The checker is stricter than the builder - it expects
  # `<a>` in section-starting-page groups where `<card>` (which the builder
  # accepts and renders correctly) was used.
  test:
    name: Test docs build
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: webHelp
          path: artifacts

      - name: Test Writerside docs
        uses: JetBrains/writerside-checker-action@v1
        with:
          instance: Writerside/azd

  deploy:
    name: Publish to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
