<!-- Docs site header logo: the plugin's brand mark - an original pull-request
     glyph in the Azure color palette, matching the JetBrains Marketplace icon.
     A generic PR symbol (not a Microsoft brand mark), so it's safe to use as
     the site's own identity. -->
<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="az" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#163697"/>
<stop offset="0.35" stop-color="#2764E7"/>
<stop offset="0.7" stop-color="#0FAFFF"/>
<stop offset="1" stop-color="#6BE7A0"/>
</linearGradient>
</defs>
<circle cx="9.375" cy="10" r="4.6" stroke="url(#az)" stroke-width="3.4"/>
<circle cx="9.375" cy="30" r="4.6" stroke="url(#az)" stroke-width="3.4"/>
<path d="M9.375 15.4V24.6" stroke="url(#az)" stroke-width="3.4" stroke-linecap="round"/>
<circle cx="30.625" cy="30" r="4.6" stroke="url(#az)" stroke-width="3.4"/>
<path d="M30.625 25.4V14C30.625 11.79 28.834 10 26.625 10H20.5" stroke="url(#az)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M24.375 14.5L19.875 10L24.375 5.5" stroke="url(#az)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
